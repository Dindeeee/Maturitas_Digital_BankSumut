# Konfigurasi HTTPS production (dipakai setelah SSL cert berhasil diperoleh)

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name maturitasdigital.site www.maturitasdigital.site;

    # Certbot renewal tetap lewat HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://maturitasdigital.site$request_uri;
    }
}

# Redirect www → non-www (HTTPS)
server {
    listen 443 ssl;
    server_name www.maturitasdigital.site;

    ssl_certificate     /etc/letsencrypt/live/maturitasdigital.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maturitasdigital.site/privkey.pem;

    return 301 https://maturitasdigital.site$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name maturitasdigital.site;
    root /var/www/public;
    index index.php;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/maturitasdigital.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maturitasdigital.site/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Laravel: serve storage files dari volume
    location /storage/ {
        alias /var/www/storage/app/public/;
        try_files $uri $uri/ =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Static assets dengan cache panjang
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* \.(env|log|lock)$ {
        deny all;
    }

    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
